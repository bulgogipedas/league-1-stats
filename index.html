<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="google-site-verification"
      content="yd8lsBDWp3exm0z2kDqXDTiHtpu7eGTnAW09FOuv7Io"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PunditStat — Indonesian Liga 1 Football Analytics</title>
    <meta
      name="description"
      content="PunditStat is a football analytics platform for Indonesian Liga 1, featuring standings, match analysis, player analytics, team analysis, and football data insights."
    />

    <link rel="canonical" href="https://punditstat.codes/" />

    <link rel="icon" type="image/png" href="/assets/logo-pundit-stats.png" />
    <link rel="apple-touch-icon" href="/assets/logo-pundit-stats.png" />

    <meta property="og:title" content="PunditStat — Indonesian Liga 1 Football Analytics" />
    <meta
      property="og:description"
      content="Football analytics platform for Indonesian Liga 1 with standings, match analysis, player analytics, and team performance insights."
    />
    <meta property="og:url" content="https://punditstat.codes/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://punditstat.codes/assets/logo-pundit-stats.png" />

    <meta name="theme-color" content="#05070A" />

    <script>
      (() => {
        const stored = localStorage.getItem("punditstat-theme");
        const theme = stored === "dark" || stored === "light"
          ? stored
          : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
