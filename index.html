<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="yd8lsBDWp3exm0z2kDqXDTiHtpu7eGTnAW09FOuv7Io" />
    <link rel="icon" type="image/png" href="/assets/logo-pundit-stats.png" />
    <link rel="apple-touch-icon" href="/assets/logo-pundit-stats.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PunditStat</title>
    <script>
      (() => {
        const stored = localStorage.getItem("punditstat-theme") || "system";
        const dark = stored === "dark" || (stored === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.dataset.theme = stored;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
