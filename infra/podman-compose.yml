services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: liga1-postgres
    environment:
      POSTGRES_DB: liga1_analytics
      POSTGRES_USER: liga1
      POSTGRES_PASSWORD: liga1_dev_password
    ports:
      - "54329:5432"
    volumes:
      - liga1_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liga1 -d liga1_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  liga1_postgres_data:
